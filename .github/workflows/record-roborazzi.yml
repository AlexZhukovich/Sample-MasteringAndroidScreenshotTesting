name: 'Record Screenshots: Roborazzi'

on:
  workflow_dispatch:

jobs:
  record-roborazzi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          # A Personal Access Token (PAT) is required so the follow-up push re-triggers other workflows.
          # The default GITHUB_TOKEN does not trigger workflow runs.
          token: ${{ secrets.PAT_SCREENSHOT_TESTS }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Record Roborazzi screenshots
        run: ./gradlew :screenshot-tests-roborazzi:recordRoborazziDebug

      - name: Commit and push recorded screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Record Roborazzi screenshots"
            git push origin HEAD:${{ github.ref_name }}
          fi